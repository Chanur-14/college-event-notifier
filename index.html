<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Event Notifier</title>
  <!-- Add Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- Add CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <header>
    <h1>College Event Notifier</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#events">Events</a>
      <a href="#admin">Admin</a>
    </nav>
  </header>

  <main>
    <section id="home">
      <h2>Welcome</h2>
      <p>This website shows Upcoming College Events.</p>
    </section>
    <section id="events">
      <h2>Available Events</h2>
      <input type="text" id="search" placeholder="Search events....." onkeyup="searchEvents()">
      <h2>Upcoming Events</h2>
      <select id="collegeFilter" onchange="filterByCollege()">
<option value="all">All Colleges</option>
<option value="SRM University">SRM University</option>
<option value="VIT University">VIT University</option>
<option value="Aditya University">Aditya University</option>
<option value="SRKR University">SRKR University</option>
</select>
      <div id="events-container"></div>
      <div id="eventList">
        <!-- Events will be displayed here -->
      </div>
    </section>
    <section id="admin">
      <h2>Add Event</h2>
      <input type="text" id="eventName" placeholder="Event Name">
      <input type="text" id="date" placeholder="Date">
      <input type="text" id="hostCollege" placeholder="Host College">
      <input type="text" id="eventimage" placeholder="Enter Image URL">

      <button onclick="addEvent()">Add Event</button>
      <button onclick="sortByDate()">Sort by Date</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 College Event Notifier</p>
  </footer>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
